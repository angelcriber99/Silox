name: Build Desktop App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        # Desktop packaging does not generate Capacitor icons. Skipping install
        # scripts avoids the legacy Sharp download used only by that dev tool.
        run: npm ci --ignore-scripts --no-audit --prefer-offline

      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v1.0.${{ github.run_number }}
          releaseName: "Silox Desktop (Build ${{ github.run_number }})"
          releaseBody: "Build autogenerado de Silox para Mac y Windows."
          releaseDraft: false
          prerelease: false
